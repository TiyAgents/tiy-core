name: Publish Model Catalog

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      source_url:
        description: "Optional source catalog endpoint override"
        required: false
        default: ""
      version:
        description: "Optional snapshot version override"
        required: false
        default: ""

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: catalog-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build catalog snapshot
        shell: bash
        env:
          SOURCE_URL_INPUT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.source_url || '' }}
          VERSION_INPUT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || '' }}
        run: |
          set -euo pipefail

          mkdir -p dist/catalog
          touch dist/.nojekyll

          ARGS=(
            --output dist/catalog/catalog.json
            --manifest-output dist/catalog/manifest.json
            --snapshot-url catalog.json
          )

          if [[ -n "${SOURCE_URL_INPUT}" ]]; then
            ARGS+=(--source-url "${SOURCE_URL_INPUT}")
          fi

          if [[ -n "${VERSION_INPUT}" ]]; then
            ARGS+=(--version "${VERSION_INPUT}")
          fi

          cargo run --bin tiy-catalog-sync -- "${ARGS[@]}"

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
